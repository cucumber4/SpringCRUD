<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form th:method="POST" th:action="@{/books}" th:object="${book}">
    <label for="name">Enter Name</label>
    <input type="text" th:field="*{name}" id="name" />
    <div style="color:rosybrown" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">Name error</div>
    <br/>
    <label for="author">Enter author</label>
    <input type="text" th:field="*{author}" id="author" />
    <div style="color:rosybrown" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">Age error</div>
    <br/>
    <label for="year">Enter year</label>
    <input type="text" th:field="*{year}" id="year" />
    <div style="color:rosybrown" th:if="${#fields.hasErrors('year')}" th:errors="*{year}">Age error</div>
    <br/>
    <hr/>
    <input type="submit" value="Create!" />
</form>
</body>
</html>
